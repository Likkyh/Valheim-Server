version: "3"
services:
  valheim:
    image: mbround18/valheim:latest
    user: "1000:1000"
    ports:
      - 2456:2456/udp
      - 2457:2457/udp
      - 2458:2458/udp
    environment:
      - PORT=2456
      - NAME=${NAME}
      - WORLD=${WORLD}
      - PASSWORD=${PASSWORD}
      - TZ=Europe/Paris
      - PUBLIC=1
      - AUTO_UPDATE=1
      - AUTO_UPDATE_SCHEDULE=0 1 * * *
      - AUTO_UPDATE_PAUSE_WITH_PLAYERS=0
    volumes:
    - ./valheim/saves:/home/steam/.config/unity3d/IronGate/Valheim
    - ./valheim/server:/home/steam/valheim
